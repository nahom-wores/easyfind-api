services:
  postgres:
    image: postgres:16-alpine
    container_name: easyfind_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: EasyFind
    ports:
      - "5432:5432"
    volumes:
      - easyfind_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: easyfind_redis
    ports:
      - "6379:6379"
    volumes:
      - easyfind_redisdata:/data
    restart: unless-stopped

volumes:
  easyfind_pgdata:
  easyfind_redisdata: